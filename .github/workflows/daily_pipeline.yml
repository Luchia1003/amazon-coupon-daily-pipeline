name: Amazon Coupon Daily Pipeline

on:
  schedule:
    # 08:15 AM Pacific Time = 15:15 UTC (PDT) / 16:15 UTC (PST)
    - cron: "15 15 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcairo2 \
            libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 \
            libglib2.0-0 libgtk-3-0 libnspr4 libnss3 \
            libpango-1.0-0 libpangocairo-1.0-0 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 \
            libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 libxkbcommon0 libdrm2 \
            fonts-liberation ca-certificates xdg-utils

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Restore Playwright session cache
        uses: actions/cache@v4
        with:
          path: session/
          key: seller-session-${{ runner.os }}

      - name: Write RSA private key from secret
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_private_key.pem

      - name: Run pipeline
        env:
          AMAZON_EMAIL: ${{ secrets.AMAZON_EMAIL }}
          AMAZON_PASSWORD: ${{ secrets.AMAZON_PASSWORD }}
          AMAZON_SELLER_ID: ${{ secrets.AMAZON_SELLER_ID }}
          AMAZON_MARKETPLACE_ID: ${{ secrets.AMAZON_MARKETPLACE_ID }}
          AMAZON_TOTP_SECRET: ${{ secrets.AMAZON_TOTP_SECRET }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_private_key.pem
        run: python main.py

      - name: Save updated session cache
        if: always()
        uses: actions/cache@v4
        with:
          path: session/
          key: seller-session-${{ runner.os }}
