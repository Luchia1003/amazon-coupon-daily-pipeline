name: Amazon Coupon Daily Pipeline

on:
  schedule:
    # 08:15 AM Pacific Time = 15:15 UTC (PDT) / 16:15 UTC (PST)
    - cron: "15 08 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore session cache
        uses: actions/cache@v4
        with:
          path: session/
          key: seller-session-linux

      - name: Write RSA private key from secret
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_private_key.pem
          chmod 600 /tmp/rsa_private_key.pem

      - name: Run pipeline
        env:
          AMAZON_SESSION_COOKIES: ${{ secrets.AMAZON_SESSION_COOKIES }}
          AMAZON_SELLER_ID: ${{ secrets.AMAZON_SELLER_ID }}
          AMAZON_MARKETPLACE_ID: ${{ secrets.AMAZON_MARKETPLACE_ID }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_private_key.pem
        run: python main.py

      # Signal the Snowflake dashboard that coupon data has landed. The coupon
      # tables (DAILY_ORDER/SKU_COUPON_PROFIT) read AMAZON_ORDER, so they run
      # only after BOTH the core pipeline succeeded today AND this signal arrives.
      - name: Signal Snowflake coupon pipeline
        if: success()
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: python -u notify_snowflake.py COUPON

      - name: Save updated session cache
        if: always()
        uses: actions/cache@v4
        with:
          path: session/
          key: seller-session-linux
